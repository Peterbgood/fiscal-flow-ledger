<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Knoxville Budget Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <style>
    .capitalize-label { text-transform: capitalize; }
    .card-transition { transition: all 0.2s ease-in-out; }
    .card-transition:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .syncing { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    
    /* Fixed container to prevent clipping */
    .chart-wrapper {
      position: relative;
      height: 350px; /* Force a height */
      width: 100%;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
  <div class="container mx-auto px-4 py-6 max-w-4xl">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-black tracking-tight">Knoxville Budget</h1>
            <p id="lastSync" class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1 italic">Waiting for sync...</p>
        </div>
        <button id="syncBtn" onclick="syncWithSheet()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95">
            <span id="btnText">Sync from Sheets</span>
        </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Monthly Net (After Tax)</p>
          <p class="text-3xl font-black text-emerald-600" id="monthlyNet">$0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Monthly Expenses</p>
          <p class="text-3xl font-black text-rose-500" id="totalBills">$0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Monthly Surplus</p>
          <p class="text-3xl font-black text-indigo-600" id="surplus">$0</p>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
        <div class="chart-wrapper">
            <canvas id="budgetChart"></canvas>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <section>
            <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="p-1 bg-emerald-100 text-emerald-600 rounded">💰</span> Income Sources
            </h2>
            <div id="incomeList" class="space-y-3"></div>
        </section>
        <section>
            <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="p-1 bg-rose-100 text-rose-600 rounded">📉</span> Monthly Expenses
            </h2>
            <div id="expenseList" class="grid grid-cols-1 gap-3"></div>
        </section>
    </div>
  </div>

  <script>
    Chart.register(ChartDataLabels);
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDoP-8zjTmyIzsFei7-icriWqs5OGQSf-9YxPnUNpftY9SRmsoUcaVmugOrEFcyoPpNKnIMu9_5mAU/pub?output=csv';
    
    let budgetData = { income: [], expenses: [] };
    let chart;

    function initChart() {
      const ctx = document.getElementById('budgetChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'bar',
        data: { 
            labels: ['Net Income', 'Expenses', 'Surplus'], 
            datasets: [{ 
                data: [0, 0, 0], 
                backgroundColor: ['#10b981', '#f43f5e', '#6366f1'], 
                borderRadius: 12,
                barThickness: 'flex',
                maxBarThickness: 80
            }] 
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            layout: {
                padding: {
                    top: 30 // Extra space at the top so labels don't get cut off
                }
            },
            plugins: { 
                legend: { display: false }, 
                datalabels: { 
                    anchor: 'end', 
                    align: 'top', 
                    offset: 5,
                    formatter: (v) => `$${Math.round(v).toLocaleString()}`, 
                    font: { weight: 'bold', size: 14 },
                    color: '#475569'
                } 
            },
            scales: { 
                y: { 
                    display: false, 
                    beginAtZero: true,
                    suggestedMax: function(context) {
                        // Dynamically add 15% headroom to the Y-axis
                        const max = Math.max(...context.chart.data.datasets[0].data);
                        return max * 1.15;
                    }
                },
                x: { grid: { display: false }, border: { display: false } }
            }
        }
      });
    }

    async function syncWithSheet() {
      const btn = document.getElementById('syncBtn');
      const btnText = document.getElementById('btnText');
      btnText.innerText = 'Syncing...';
      btn.classList.add('syncing');
      
      try {
        const response = await fetch(`${sheetUrl}&cachebust=${new Date().getTime()}`);
        const csvText = await response.text();
        const rows = csvText.split(/\r?\n/).filter(row => row.trim().length > 0).slice(1); 

        budgetData = { income: [], expenses: [] };

        rows.forEach(row => {
            const cols = row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
            if (cols.length >= 2) {
                const label = cols[0].replace(/"/g, '').trim();
                const value = parseFloat(cols[1].replace(/[$,"]/g, '').trim()) || 0;
                
                const lowerLabel = label.toLowerCase();
                if (lowerLabel.includes('husband') || lowerLabel.includes('wife') || lowerLabel.includes('income')) {
                    budgetData.income.push({ label, value });
                } else {
                    budgetData.expenses.push({ label, value });
                }
            }
        });

        renderLists();
        updateDisplay();
        document.getElementById('lastSync').innerText = `Synced: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
      } catch (e) {
        console.error("Sync Error:", e);
        btnText.innerText = 'Sync Error';
      } finally {
        setTimeout(() => { 
            btnText.innerText = 'Sync from Sheets'; 
            btn.classList.remove('syncing');
        }, 800);
      }
    }

    function renderLists() {
        const incDiv = document.getElementById('incomeList');
        const expDiv = document.getElementById('expenseList');
        incDiv.innerHTML = budgetData.income.map(item => createRow(item, 'income')).join('');
        expDiv.innerHTML = budgetData.expenses.map(item => createRow(item, 'expense')).join('');
    }

    function createRow(item, type) {
        return `
            <div class="card-transition flex justify-between items-center bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                <span class="text-sm font-bold text-slate-600 capitalize-label">${item.label}</span>
                <span class="font-mono font-black ${type === 'income' ? 'text-emerald-600' : 'text-slate-900'}">
                    $${item.value.toLocaleString()}
                </span>
            </div>
        `;
    }

    function updateDisplay() {
      const taxRate = 0.7253; 
      const totalGrossIncome = budgetData.income.reduce((sum, item) => sum + item.value, 0);
      const monthlyNet = (totalGrossIncome * taxRate) / 12;
      const totalExpenses = budgetData.expenses.reduce((sum, item) => sum + item.value, 0);
      const surplus = monthlyNet - totalExpenses;

      document.getElementById('monthlyNet').innerText = `$${Math.round(monthlyNet).toLocaleString()}`;
      document.getElementById('totalBills').innerText = `$${Math.round(totalExpenses).toLocaleString()}`;
      document.getElementById('surplus').innerText = `$${Math.round(surplus).toLocaleString()}`;

      chart.data.datasets[0].data = [monthlyNet, totalExpenses, surplus];
      chart.update();
    }

    initChart();
    syncWithSheet();
  </script>
</body>
</html>
