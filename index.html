<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Knoxville Budget Overview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <style>
    .chart-container {
      max-width: 100%;
      margin: 0 auto;
      padding: 16px;
    }
    canvas {
      width: 100% !important;
      height: 400px !important;
    }
    @media (max-width: 640px) {
      .chart-container {
        padding: 8px;
      }
      canvas {
        height: 300px !important;
      }
      input, label, button {
        font-size: 0.85rem;
      }
      h2 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body class="bg-gray-100">
  <div class="container mx-auto px-4 py-6 sm:py-8 max-w-4xl">
    <h1 class="text-2xl sm:text-3xl font-bold text-center text-gray-800 mb-6">
      Knoxville Budget Overview
    </h1>

    <div class="mb-6 bg-white shadow-lg rounded-lg p-6">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">Income</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label for="yourIncome" class="block text-sm font-medium text-gray-700">Your Annual Income (Gross)</label>
          <input type="number" id="yourIncome" value="0" inputmode="numeric" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        </div>
        <div>
          <label for="wifeIncome" class="block text-sm font-medium text-gray-700">Wife's Annual Income (Gross)</label>
          <input type="number" id="wifeIncome" value="95000" inputmode="numeric" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        </div>
      </div>
    </div>

    <div class="mb-6 bg-white shadow-lg rounded-lg p-6">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">Financial Summary</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div>
          <h3 class="text-lg font-medium text-gray-700 mb-2">Income</h3>
          <div class="space-y-2">
            <div>
              <p class="text-sm font-medium text-gray-700">Combined Annual Gross:</p>
              <p class="text-base font-bold text-gray-900" id="currentCombinedIncome">$0</p>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-700">Monthly Combined (Post-Tax):</p>
              <p class="text-base font-bold text-green-600" id="monthlyCombinedIncome">$0</p>
            </div>
          </div>
        </div>

        <div>
          <h3 class="text-lg font-medium text-gray-700 mb-2">Expenses & Surplus</h3>
          <div class="space-y-2">
            <div>
              <p class="text-sm font-medium text-gray-700">Total Monthly Bills:</p>
              <p class="text-base font-bold text-red-600" id="totalBills">$0</p>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-700">Monthly Surplus:</p>
              <p class="text-base font-bold text-indigo-600" id="surplus">$0</p>
            </div>
          </div>
        </div>

        <div>
          <h3 class="text-lg font-medium text-gray-700 mb-2">Analysis</h3>
          <div class="space-y-2">
            <div>
              <p class="text-sm font-medium text-gray-700">Housing Cost Ratio:</p>
              <p class="text-base font-bold text-gray-900" id="housingRatio">0%</p>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-700">Min. Annual Income Needed:</p>
              <p class="text-base font-bold text-gray-900" id="minIncome">$0</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="chart-container bg-white shadow-lg rounded-lg mb-6">
      <canvas id="budgetChart"></canvas>
    </div>

    <div class="bg-white shadow-lg rounded-lg p-6">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">Monthly Expenses</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="expensesGrid">
        <div>
          <label for="mortgage" class="block text-sm font-medium text-gray-700">Mortgage</label>
          <input type="number" id="mortgage" value="1600" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="foodGroceries" class="block text-sm font-medium text-gray-700">Food/Groceries</label>
          <input type="number" id="foodGroceries" value="1000" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="tesla1" class="block text-sm font-medium text-gray-700">Tesla (1)</label>
          <input type="number" id="tesla1" value="490" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="tesla2" class="block text-sm font-medium text-gray-700">Tesla (2)</label>
          <input type="number" id="tesla2" value="415" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="sands" class="block text-sm font-medium text-gray-700">S&S</label>
          <input type="number" id="sands" value="400" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="carInsurance" class="block text-sm font-medium text-gray-700">Car Insurance</label>
          <input type="number" id="carInsurance" value="300" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="electric" class="block text-sm font-medium text-gray-700">Electric</label>
          <input type="number" id="electric" value="250" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="phone" class="block text-sm font-medium text-gray-700">Phone</label>
          <input type="number" id="phone" value="150" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="water" class="block text-sm font-medium text-gray-700">Water</label>
          <input type="number" id="water" value="150" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="insurance" class="block text-sm font-medium text-gray-700">Life Insurance</label>
          <input type="number" id="insurance" value="90" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="internet" class="block text-sm font-medium text-gray-700">Internet</label>
          <input type="number" id="internet" value="65" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="sling" class="block text-sm font-medium text-gray-700">Philo/Sling</label>
          <input type="number" id="sling" value="35" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="tucker" class="block text-sm font-medium text-gray-700">Tucker</label>
          <input type="number" id="tucker" value="45" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="odie" class="block text-sm font-medium text-gray-700">Odie</label>
          <input type="number" id="odie" value="30" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="amazon" class="block text-sm font-medium text-gray-700">Amazon</label>
          <input type="number" id="amazon" value="20" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
          <label for="netflix" class="block text-sm font-medium text-gray-700">Netflix</label>
          <input type="number" id="netflix" value="20" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
      </div>
    </div>
  </div>

  <script>
    Chart.register(ChartDataLabels);
    const ctx = document.getElementById('budgetChart').getContext('2d');

    // These MUST match the IDs in the HTML inputs
    const expenseKeys = [
      'mortgage', 'foodGroceries', 'tesla1', 'tesla2', 'sands', 
      'carInsurance', 'electric', 'phone', 'water', 'insurance', 
      'internet', 'sling', 'tucker', 'odie', 'amazon', 'netflix'
    ];

    // Global variable for chart to allow updates
    let chart;

    function initChart() {
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Income (Post-Tax)', 'Bills', 'Surplus'],
          datasets: [{
            data: [0, 0, 0],
            backgroundColor: [
              'rgba(34, 197, 94, 0.8)', // Green
              'rgba(239, 68, 68, 0.8)',  // Red
              'rgba(79, 70, 229, 0.8)'   // Indigo
            ],
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            datalabels: {
              anchor: 'end',
              align: 'top',
              formatter: (value) => `$${Math.round(value).toLocaleString()}`,
              font: { weight: 'bold' }
            }
          },
          scales: {
            y: { beginAtZero: true, ticks: { callback: (v) => '$' + v } }
          }
        }
      });
    }

    function updateDisplay() {
      // 1. Get Income Values
      const yInc = parseFloat(document.getElementById('yourIncome').value) || 0;
      const wInc = parseFloat(document.getElementById('wifeIncome').value) || 0;
      const taxRate = 0.7253; // Assuming ~27% tax/deductions

      const monthlyPostTax = ((yInc + wInc) * taxRate) / 12;

      // 2. Get Expense Values
      let totalBills = 0;
      const expensesObj = {};
      expenseKeys.forEach(key => {
        const val = parseFloat(document.getElementById(key).value) || 0;
        expensesObj[key] = val;
        totalBills += val;
      });

      const surplus = monthlyPostTax - totalBills;
      const grossMonthly = (yInc + wInc) / 12;

      // 3. Update Chart
      chart.data.datasets[0].data = [monthlyPostTax, totalBills, surplus];
      chart.update();

      // 4. Update UI Text
      document.getElementById('currentCombinedIncome').textContent = `$${(yInc + wInc).toLocaleString()}`;
      document.getElementById('monthlyCombinedIncome').textContent = `$${Math.round(monthlyPostTax).toLocaleString()}`;
      document.getElementById('totalBills').textContent = `$${Math.round(totalBills).toLocaleString()}`;
      document.getElementById('surplus').textContent = `$${Math.round(surplus).toLocaleString()}`;
      
      const minAnnual = (totalBills * 12) / taxRate;
      document.getElementById('minIncome').textContent = `$${Math.round(minAnnual).toLocaleString()}`;

      if (grossMonthly > 0) {
        const hRatio = (expensesObj.mortgage / grossMonthly) * 100;
        document.getElementById('housingRatio').textContent = `${hRatio.toFixed(1)}%`;
      }
    }

    // Attach Listeners to everything
    document.getElementById('yourIncome').addEventListener('input', updateDisplay);
    document.getElementById('wifeIncome').addEventListener('input', updateDisplay);
    
    expenseKeys.forEach(key => {
      document.getElementById(key).addEventListener('input', updateDisplay);
    });

    // Start
    initChart();
    updateDisplay();
  </script>
</body>
</html>
